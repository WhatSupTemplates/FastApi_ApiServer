name: fastapi-ai-server
channels:
  - conda-forge
  - defaults
dependencies:
  # Python
  - python=3.11

  # Web Framework
  - fastapi=0.128.0
  - uvicorn=0.40.0

  # Database & Storage
  - sqlalchemy=2.0.45
  - aiosqlite=0.20.0
  - redis-py=7.1.0
  
  # Security
  - cryptography
  - argon2-cffi=23.1.0
    
  # Utilities
  - python-dotenv=1.2.1
  - pydantic=2.12.5
  
  # pip으로만 설치 가능한 패키지들
  - pip
  - pip:
    - pydantic-settings==2.12.0
    - python-multipart==0.0.6
    - python-jose[cryptography]==3.3.0
    - passlib[argon2]==1.7.4
    - email-validator==2.1.0
    - asyncpg==0.31.0  # PostgreSQL driver
