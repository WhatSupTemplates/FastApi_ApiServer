<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastAPI 인증 샘플</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .section h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #6c757d;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 14px;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .token-display {
            background: #2d3748;
            color: #68d391;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            word-break: break-all;
            margin-top: 10px;
            max-height: 100px;
            overflow-y: auto;
        }

        .api-result {
            background: #2d3748;
            color: #fff;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 10px;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔐 FastAPI 인증 샘플</h1>
            <p>로그인, 토큰 갱신, API 호출 테스트</p>
        </div>

        <div class="content">
            <!-- 회원가입 섹션 -->
            <div class="section">
                <h2>1️⃣ 회원가입</h2>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="registerEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>사용자명</label>
                    <input type="text" id="registerUsername" placeholder="username">
                </div>
                <div class="form-group">
                    <label>비밀번호 (8자 이상, 대소문자+숫자 포함)</label>
                    <input type="password" id="registerPassword" placeholder="Password123!">
                </div>
                <button onclick="register()">회원가입</button>
                <div id="registerStatus"></div>
            </div>

            <!-- 로그인 섹션 -->
            <div class="section">
                <h2>2️⃣ 로그인</h2>
                <div class="form-group">
                    <label>이메일</label>
                    <input type="email" id="loginEmail" placeholder="user@example.com">
                </div>
                <div class="form-group">
                    <label>비밀번호</label>
                    <input type="password" id="loginPassword" placeholder="password">
                </div>
                <button onclick="login()">로그인</button>
                <button class="secondary" onclick="logout()">로그아웃</button>
                <div id="loginStatus"></div>
                <div id="tokenDisplay"></div>
            </div>

            <!-- 토큰 갱신 섹션 -->
            <div class="section">
                <h2>3️⃣ 토큰 갱신</h2>
                <p style="color: #666; margin-bottom: 15px;">
                    리프레시 토큰으로 새로운 액세스 토큰을 발급받습니다.
                </p>
                <button onclick="refreshToken()">토큰 갱신</button>
                <div id="refreshStatus"></div>
            </div>

            <!-- API 호출 테스트 -->
            <div class="section">
                <h2>4️⃣ API 호출 테스트</h2>
                <div class="button-group">
                    <button onclick="testPublicAPI()">🌍 공개 API (인증 불필요)</button>
                    <button onclick="testAuthAPI()">🔒 인증 API (로그인 필요)</button>
                    <button onclick="testAutoRefresh()">🔄 자동 갱신 테스트</button>
                </div>
                <div id="apiStatus"></div>
                <div id="apiResult"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://127.0.0.1:8000';

        // 회원가입
        async function register() {
            const email = document.getElementById('registerEmail').value;
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;

            try {
                const response = await fetch(`${API_BASE}/api/v1/users/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('registerStatus', `✅ 회원가입 성공! 사용자명: ${data.username}`, 'success');
                } else {
                    // 422 검증 에러 상세 표시
                    if (response.status === 422 && data.detail) {
                        let errorMsg = '❌ 입력값 검증 실패:\n';
                        if (Array.isArray(data.detail)) {
                            data.detail.forEach(err => {
                                errorMsg += `- ${err.loc.join('.')}: ${err.msg}\n`;
                            });
                        } else {
                            errorMsg += data.detail;
                        }
                        showStatus('registerStatus', errorMsg.replace(/\n/g, '<br>'), 'error');
                    } else {
                        showStatus('registerStatus', `❌ ${data.detail}`, 'error');
                    }
                }
            } catch (error) {
                showStatus('registerStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 로그인
        async function login() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const formData = new URLSearchParams();
                formData.append('username', email);  // OAuth2 스펙상 username 필드 사용, 하지만 이메일 입력
                formData.append('password', password);

                const response = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    // 토큰 저장
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    showStatus('loginStatus', '✅ 로그인 성공!', 'success');
                    displayTokens();
                } else {
                    showStatus('loginStatus', `❌ ${data.detail}`, 'error');
                }
            } catch (error) {
                showStatus('loginStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 로그아웃
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            showStatus('loginStatus', '✅ 로그아웃 되었습니다', 'info');
            document.getElementById('tokenDisplay').innerHTML = '';
        }

        // 토큰 표시
        function displayTokens() {
            const accessToken = localStorage.getItem('access_token');
            const refreshToken = localStorage.getItem('refresh_token');

            if (accessToken) {
                document.getElementById('tokenDisplay').innerHTML = `
                    <div style="margin-bottom: 10px;">
                        <strong>액세스 토큰:</strong><br>
                        <div class="token-display">${accessToken.substring(0, 50)}...</div>
                    </div>
                    <div>
                        <strong>리프레시 토큰:</strong><br>
                        <div class="token-display">${refreshToken.substring(0, 50)}...</div>
                    </div>
                `;
            }
        }

        // 토큰 갱신
        async function refreshToken() {
            const refreshToken = localStorage.getItem('refresh_token');

            if (!refreshToken) {
                showStatus('refreshStatus', '❌ 리프레시 토큰이 없습니다. 먼저 로그인하세요.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/v1/auth/refresh`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh_token: refreshToken })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    showStatus('refreshStatus', '✅ 토큰 갱신 성공!', 'success');
                    displayTokens();
                } else {
                    showStatus('refreshStatus', `❌ ${data.detail}`, 'error');
                }
            } catch (error) {
                showStatus('refreshStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 공개 API 테스트 (인증 불필요)
        async function testPublicAPI() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/sample-posts`);
                const data = await response.json();

                showStatus('apiStatus', '✅ 공개 API 호출 성공 (인증 불필요)', 'success');
                document.getElementById('apiResult').innerHTML =
                    `<div class="api-result">${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                showStatus('apiStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 인증 API 테스트 (로그인 필요)
        async function testAuthAPI() {
            const token = localStorage.getItem('access_token');

            if (!token) {
                showStatus('apiStatus', '❌ 액세스 토큰이 없습니다. 먼저 로그인하세요.', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/api/v1/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus('apiStatus', '✅ 인증 API 호출 성공!', 'success');
                    document.getElementById('apiResult').innerHTML =
                        `<div class="api-result">${JSON.stringify(data, null, 2)}</div>`;
                } else {
                    showStatus('apiStatus', `❌ ${data.detail} (${response.status})`, 'error');
                }
            } catch (error) {
                showStatus('apiStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 자동 갱신 테스트
        async function testAutoRefresh() {
            let token = localStorage.getItem('access_token');

            if (!token) {
                showStatus('apiStatus', '❌ 먼저 로그인하세요.', 'error');
                return;
            }

            try {
                // 첫 번째 시도
                let response = await fetch(`${API_BASE}/api/v1/users/me`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                // 401 에러 시 자동 갱신
                if (response.status === 401) {
                    showStatus('apiStatus', '⚠️ 토큰 만료! 자동으로 갱신합니다...', 'info');

                    const refreshToken = localStorage.getItem('refresh_token');
                    const refreshResponse = await fetch(`${API_BASE}/api/v1/auth/refresh`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ refresh_token: refreshToken })
                    });

                    if (refreshResponse.ok) {
                        const refreshData = await refreshResponse.json();
                        localStorage.setItem('access_token', refreshData.access_token);
                        localStorage.setItem('refresh_token', refreshData.refresh_token);

                        // 새 토큰으로 재시도
                        response = await fetch(`${API_BASE}/api/v1/users/me`, {
                            headers: { 'Authorization': `Bearer ${refreshData.access_token}` }
                        });

                        showStatus('apiStatus', '✅ 자동 갱신 후 API 호출 성공!', 'success');
                    } else {
                        showStatus('apiStatus', '❌ 토큰 갱신 실패', 'error');
                        return;
                    }
                } else {
                    showStatus('apiStatus', '✅ API 호출 성공 (토큰 유효)', 'success');
                }

                const data = await response.json();
                document.getElementById('apiResult').innerHTML =
                    `<div class="api-result">${JSON.stringify(data, null, 2)}</div>`;

            } catch (error) {
                showStatus('apiStatus', `❌ 오류: ${error.message}`, 'error');
            }
        }

        // 상태 메시지 표시
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        // 페이지 로드 시 토큰 표시
        window.onload = function () {
            if (localStorage.getItem('access_token')) {
                displayTokens();
                showStatus('loginStatus', '✅ 저장된 토큰이 있습니다', 'info');
            }
        };
    </script>
</body>

</html>
